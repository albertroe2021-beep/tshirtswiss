<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to TShirtSwiss.ch homepage preview</title>
  <script>
    (function () {
      var target = 'pages/home/index.html';
      var workerUrl = 'site-header-sw.js?v=ts-v47-new-mapped-icons-only';
      function go() { window.location.replace(target); }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration('./').then(function (existing) {
          var ready = existing ? existing.unregister() : Promise.resolve();
          return ready.then(function () {
            return navigator.serviceWorker.register(workerUrl, { scope: './' });
          });
        }).then(function (registration) {
          if (registration.waiting) { registration.waiting.postMessage({ type: 'SKIP_WAITING' }); }
          return navigator.serviceWorker.ready;
        }).then(function () {
          go();
        }).catch(go);
        setTimeout(go, 1800);
      } else {
        go();
      }
    }());
  </script>
</head>
<body>
  <p>Refreshing TShirtSwiss icon mapping and redirecting to <a href="pages/home/index.html">homepage preview</a>...</p>
</body>
</html>
